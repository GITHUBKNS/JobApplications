<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @page { margin: 1in; size: letter; }
  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 11pt;
    line-height: 1.6;
    color: #222;
    margin: 0;
    padding: 0;
  }
  .header { margin-bottom: 24px; }
  .name { font-size: 16pt; font-weight: bold; margin-bottom: 4px; }
  .meta { font-size: 10pt; color: #666; }
  .body-text { white-space: pre-wrap; }
  .signature { margin-top: 24px; }
</style>
</head>
<body>

<div class="header">
  <div class="name">{{ candidate_name }}</div>
  <div class="meta">Application for {{ job_title }} at {{ company }}</div>
</div>

<div class="body-text">{{ text }}</div>

<div class="signature">
  <p>Sincerely,<br>{{ candidate_name }}</p>
</div>

</body>
</html>
